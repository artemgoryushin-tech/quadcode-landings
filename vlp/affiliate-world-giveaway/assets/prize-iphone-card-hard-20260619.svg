<svg xmlns="http://www.w3.org/2000/svg" width="520" height="700" viewBox="0 0 520 700">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#111116" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfbfd"/>
    </linearGradient>
  </defs>
  <rect width="520" height="700" fill="transparent"/>
  <g filter="url(#shadow)">
    <rect x="54" y="34" width="412" height="612" rx="34" fill="url(#card)"/>
    <rect x="84" y="66" width="352" height="484" rx="18" fill="url(#inner)"/>
    <image href="prize-iphone-safe.png" x="122" y="88" width="276" height="430" preserveAspectRatio="xMidYMid meet"/>
    <text x="84" y="596" fill="#ff2d2d" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="1.2">HEADLINE PRIZE</text>
    <text x="436" y="596" text-anchor="end" fill="#111116" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">iPhone</text>
  </g>
</svg>
